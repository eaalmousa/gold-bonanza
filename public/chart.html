<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      overflow: hidden;
    }
    #tv_chart_container {
      width: 100%;
      height: 100%;
    }
    /* Loading indicator */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: rgba(255,255,255,0.3);
      font-family: 'JetBrains Mono', monospace, sans-serif;
      font-size: 13px;
      gap: 12px;
      z-index: 10;
      pointer-events: none;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(212,175,55,0.15);
      border-top-color: rgba(212,175,55,0.7);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading chart…</span>
  </div>
  <div id="tv_chart_container"></div>

  <!-- TradingView full library — reliable Widget constructor -->
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    // Read symbol from query params: /chart.html?symbol=BTCUSDT&interval=15
    const params   = new URLSearchParams(window.location.search);
    const rawSym   = params.get('symbol') || 'BTCUSDT';
    const interval = params.get('interval') || '15';
    // Try perps first (.P suffix in BINANCE namespace)
    const tvSymbol = 'BINANCE:' + rawSym + '.P';

    function initWidget() {
      // Hide loading overlay once container is ready
      const hideLoading = () => {
        const el = document.getElementById('loading');
        if (el) el.style.display = 'none';
      };

      if (typeof TradingView === 'undefined') {
        document.getElementById('loading').innerHTML =
          '<span style="color:#ef4444">TradingView failed to load.<br>Check internet connection.</span>';
        return;
      }

      new TradingView.widget({
        container_id: 'tv_chart_container',
        width:  '100%',
        height: '100%',
        autosize: true,
        symbol: tvSymbol,
        interval: interval,
        timezone: 'Etc/UTC',
        theme: 'dark',
        style: '1',       // Candlestick
        locale: 'en',
        toolbar_bg:  '#0a0a0f',
        enable_publishing: false,
        backgroundColor: 'rgba(10,10,15,1)',
        gridColor:        'rgba(255,255,255,0.03)',
        hide_top_toolbar:   false,
        hide_legend:        false,
        hide_side_toolbar:  false,
        allow_symbol_change: true,
        save_image: false,
        studies: [
          { id: 'MASimple@tv-basicstudies', inputs: { length: 20 } },
          { id: 'MASimple@tv-basicstudies', inputs: { length: 50 } },
          'MACD@tv-basicstudies',
          'BB@tv-basicstudies',
          'Volume@tv-basicstudies',
        ],
        overrides: {
          'mainSeriesProperties.candleStyle.upColor':          '#22c55e',
          'mainSeriesProperties.candleStyle.downColor':        '#ef4444',
          'mainSeriesProperties.candleStyle.borderUpColor':    '#22c55e',
          'mainSeriesProperties.candleStyle.borderDownColor':  '#ef4444',
          'mainSeriesProperties.candleStyle.wickUpColor':      '#22c55e',
          'mainSeriesProperties.candleStyle.wickDownColor':    '#ef4444',
          'paneProperties.background':                         '#0a0a0f',
          'paneProperties.vertGridProperties.color':           'rgba(255,255,255,0.03)',
          'paneProperties.horzGridProperties.color':           'rgba(255,255,255,0.03)',
        },
        loading_screen: { backgroundColor: '#0a0a0f', foregroundColor: '#d4af37' },
        onChartReady: hideLoading,
      });

      // Fallback: hide spinner after 8s regardless
      setTimeout(hideLoading, 8000);
    }

    // Wait for DOM + tv.js to be ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initWidget);
    } else {
      initWidget();
    }
  </script>
</body>
</html>
